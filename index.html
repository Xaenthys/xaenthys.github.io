<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaenthys — Apps</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #6c63ff;
            --accent-hover: #7b73ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            padding: 48px 0 32px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* App Cards */
        .apps {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px 0 64px;
        }

        .app-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            transition: border-color 0.2s;
        }

        .app-card:hover {
            border-color: #3a3a3a;
        }

        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-info {
            flex: 1;
        }

        .app-info h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .app-info .tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .app-info .platform {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .app-links {
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .app-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .app-links a:hover {
            color: var(--text);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-card {
                flex-direction: column;
                text-align: center;
                padding: 24px;
            }

            .app-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Xaenthys</h1>
            <p>Apps &amp; Projects</p>
        </header>

        <section class="apps">
            <div class="app-card">
                <div class="app-icon"><img src="cultivationtimer/icon.png" alt="CultivationTimer app icon"></div>
                <div class="app-info">
                    <h2>CultivationTimer</h2>
                    <p class="tagline">Track your cultivation practice sessions.</p>
                    <span class="platform">iOS</span>
                </div>
                <div class="app-links">
                    <a href="cultivationtimer/privacy.html">Privacy</a>
                    <a href="cultivationtimer/terms.html">Terms</a>
                </div>
            </div>

            <!-- Future apps go here -->
        </section>

        <footer>
            &copy; 2026 Xaenthys. All rights reserved.
        </footer>
    </div>
</body>
</html>
